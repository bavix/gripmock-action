name: check-dist

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  check-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Build dist
        run: npm run build

      - name: Verify dist is committed
        run: git diff --exit-code -- dist/
